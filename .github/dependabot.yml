version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # npm — all workspaces managed from root (npm workspaces share a single
  # package-lock.json; per-workspace entries produce PRs without lockfile
  # updates, which always fail npm ci)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-root-minor-patch:
        update-types:
          - minor
          - patch
