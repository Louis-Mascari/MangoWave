<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MangoWave — Audio-Reactive Visualizer</title>
    <meta
      name="description"
      content="A free, browser-based, audio-reactive visualizer inspired by Winamp and MilkDrop—no signup, no install. Share a tab or connect Spotify to watch your music come alive."
    />
    <meta property="og:title" content="MangoWave — Audio-Reactive Visualizer" />
    <meta
      property="og:description"
      content="A free, browser-based, audio-reactive visualizer inspired by Winamp and MilkDrop—no signup, no install. Share a tab or connect Spotify to watch your music come alive."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mangowave.app" />
    <meta property="og:image" content="https://mangowave.app/landing/baby_mango.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MangoWave — Audio-Reactive Visualizer" />
    <meta
      name="twitter:description"
      content="A free, browser-based, audio-reactive visualizer inspired by Winamp and MilkDrop—no signup, no install. Share a tab or connect Spotify to watch your music come alive."
    />
    <meta name="twitter:image" content="https://mangowave.app/landing/baby_mango.png" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <img src="howling.png" class="bg-howling" aria-hidden="true" alt="" />
    <div class="content">
      <img src="logo.png" alt="MangoWave logo" class="logo" />
      <h1>MangoWave</h1>
      <p class="tagline">
        A free, browser-based, audio-reactive visualizer inspired by Winamp and MilkDrop—no signup,
        no install. Share a tab or connect Spotify to watch your music come alive.
      </p>

      <div class="features">
        <!-- MilkDrop Presets -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff8c32"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path
              d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
            />
            <path d="M2 12h20" />
          </svg>
          <span>500+ Presets</span>
        </div>

        <!-- 10-Band EQ -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#c850c8"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <line x1="4" y1="21" x2="4" y2="14" />
            <line x1="8" y1="21" x2="8" y2="7" />
            <line x1="12" y1="21" x2="12" y2="10" />
            <line x1="16" y1="21" x2="16" y2="4" />
            <line x1="20" y1="21" x2="20" y2="12" />
          </svg>
          <span>10-Band EQ</span>
        </div>

        <!-- Spotify -->
        <div class="feature">
          <svg viewBox="0 0 24 24" fill="#1DB954">
            <path
              d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"
            />
          </svg>
          <span>Spotify Integration</span>
        </div>

        <!-- WebGL 2 -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#50b0ff"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
            <line x1="12" y1="22" x2="12" y2="15.5" />
            <polyline points="22 8.5 12 15.5 2 8.5" />
            <polyline points="2 15.5 12 8.5 22 15.5" />
            <line x1="12" y1="2" x2="12" y2="8.5" />
          </svg>
          <span>WebGL 2</span>
        </div>

        <!-- Real-time FFT -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff6090"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          <span>Real-Time FFT</span>
        </div>

        <!-- Zero Install -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#50dda0"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="16 12 12 8 8 12" />
            <line x1="12" y1="16" x2="12" y2="8" />
          </svg>
          <span>Zero Install</span>
        </div>
      </div>

      <a href="https://play.mangowave.app" class="cta">
        Launch App
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </a>

      <div class="links">
        <a href="https://github.com/Louis-Mascari/MangoWave" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          GitHub
        </a>
        <a href="https://ko-fi.com/louismascari" target="_blank" rel="noopener" class="treat-link">
          <svg viewBox="0 0 32 32" fill="currentColor" width="18" height="18">
            <path
              d="M6 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm20 0a4 4 0 1 1 0-8 4 4 0 0 1 0 8zM8 12h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2zm18 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8zM6 26a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"
            />
          </svg>
          Buy Mango a Treat
        </a>
      </div>
    </div>
  </body>
</html>
