name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        # Audit level set to critical (not high) to work around GHSA-8gc5-j5rx-235r:
        # fast-xml-parser numeric entity expansion via @aws-sdk/xml-builder. Not exploitable
        # here — fast-xml-parser only processes AWS service responses, never user input.
        # AWS SDK hasn't published a fix yet. Restore --audit-level=high once Dependabot
        # bumps @aws-sdk/* to a version that uses fast-xml-parser@5.5.6+.
        run: pnpm audit --audit-level=critical

      - name: Prettier check
        run: pnpm run format:check

      - name: Dead code check (Knip)
        run: pnpm exec knip

      - name: ESLint (frontend)
        run: pnpm --filter @mangowave/frontend run lint

      - name: Typecheck (frontend)
        run: pnpm exec tsc -b --noEmit
        working-directory: packages/frontend

      - name: Typecheck (backend)
        run: pnpm exec tsc --noEmit
        working-directory: packages/backend

      - name: Typecheck (infrastructure)
        run: pnpm exec tsc --noEmit
        working-directory: infrastructure

      - name: Test (frontend)
        run: pnpm --filter @mangowave/frontend run test

      - name: Test (backend)
        run: pnpm --filter @mangowave/backend run test

      - name: Test (infrastructure)
        run: pnpm --filter infrastructure run test

  e2e:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
        working-directory: packages/frontend

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
        working-directory: packages/frontend

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps
        working-directory: packages/frontend

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: packages/frontend

      - name: Upload test report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14
