name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        # Audit level set to critical (not high) to work around GHSA-8gc5-j5rx-235r:
        # fast-xml-parser numeric entity expansion via @aws-sdk/xml-builder. Not exploitable
        # here — fast-xml-parser only processes AWS service responses, never user input.
        # AWS SDK hasn't published a fix yet. Restore --audit-level=high once Dependabot
        # bumps @aws-sdk/* to a version that uses fast-xml-parser@5.5.6+.
        run: npm audit --audit-level=critical

      - name: Prettier check
        run: npm run format:check

      - name: Dead code check (Knip)
        run: npx knip

      - name: ESLint (frontend)
        run: npm run lint --workspace=packages/frontend

      - name: Typecheck (frontend)
        run: npx tsc -b --noEmit
        working-directory: packages/frontend

      - name: Typecheck (backend)
        run: npx tsc --noEmit
        working-directory: packages/backend

      - name: Typecheck (infrastructure)
        run: npx tsc --noEmit
        working-directory: infrastructure

      - name: Test (frontend)
        run: npm run test --workspace=packages/frontend

      - name: Test (backend)
        run: npm run test --workspace=packages/backend

      - name: Test (infrastructure)
        run: npm run test --workspace=infrastructure

  e2e:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
        working-directory: packages/frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
        working-directory: packages/frontend

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
        working-directory: packages/frontend

      - name: Run E2E tests
        run: npx playwright test
        working-directory: packages/frontend

      - name: Upload test report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14
