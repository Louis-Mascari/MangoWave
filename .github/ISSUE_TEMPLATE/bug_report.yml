name: Bug Report
description: Report a bug or visual glitch
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: browser-os
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 124 / Windows 11
    validations:
      required: true
  - type: dropdown
    id: audio-source
    attributes:
      label: Audio Source
      options:
        - System Audio
        - Local File
        - Microphone
        - Spotify
        - N/A
    validations:
      required: false
  - type: input
    id: preset
    attributes:
      label: Current Preset
      description: Which preset was active when the issue occurred?
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
    validations:
      required: false
