  <body>
    <div class="bg-glow"></div>
    <img src="images/howling.png" class="bg-howling" aria-hidden="true" alt="" />
    <div class="content">
      <h1>MangoWave</h1>
      <p class="tagline">
        Your music, visualized.<br />
        Every beat, every drop.<br />
        Just hit launch.
      </p>

      <div class="features">
        <!-- 500+ Visuals -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff8c32"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          <span>500+ Visuals</span>
        </div>

        <!-- Any Audio Source -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#c850c8"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"

            <path d="M3 18v-6a9 9 0 0 1 18 0v6" />

        <!-- Desktop & Mobile -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff6090"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="3" width="13" height="10" rx="1" />
            <line x1="8.5" y1="13" x2="8.5" y2="15" />
            <line x1="5.5" y1="15" x2="11.5" y2="15" />
            <rect x="16" y="5" width="6" height="11" rx="1" />
            <line x1="18" y1="14" x2="20" y2="14" />

          <span>Desktop &amp; Mobile</span>
        </div>

        <!-- No Signup -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#50dda0"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"

            <rect x="5" y="11" width="14" height="10" rx="2" />
            <path d="M12 17a1 1 0 1 0 0-2 1 1 0 0 0 0 2z" />
            <path d="M8 11V7a4 4 0 0 1 8 0" />
          </svg>
          <span>No Signup</span>
        </div>

        <!-- No Install -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#50b0ff"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          <span>No Install</span>
        </div>

        <!-- No Ads -->
        <div class="feature">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff8c32"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            <polyline points="9 12 11 14 15 10" />

          <span>No Ads</span>
        </div>

          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
