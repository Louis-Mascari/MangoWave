version: 2

updates:
  # GitHub Actions — group everything, CI validates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions-all:
        update-types:
          - major
          - minor
          - patch

  # npm ecosystem (covers pnpm) — all workspaces managed from root
  # (pnpm workspaces share a single pnpm-lock.yaml; per-workspace
  # entries produce PRs without lockfile updates, which always fail)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      # Dev tooling — CI catches breakage, review as a batch
      npm-dev-major:
        dependency-type: development
        update-types:
          - major
      # Runtime majors — review breaking changes together
      npm-prod-major:
        dependency-type: production
        update-types:
          - major
      # Everything else — low-risk, one PR
      npm-minor-patch:
        update-types:
          - minor
          - patch
